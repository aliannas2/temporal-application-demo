apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
          resources:
{{ toYaml .Values.postgres.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      initContainers:
        - name: ensure-visibility-database
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
          env:
            - name: PGPASSWORD
              value: {{ .Values.postgres.password | quote }}
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres -p {{ .Values.temporal.dbPort | quote }} -U {{ .Values.postgres.user | quote }}; do
                sleep 2
              done
              psql -h postgres -p {{ .Values.temporal.dbPort | quote }} -U {{ .Values.postgres.user | quote }} -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='temporal_visibility'" | grep -q 1 || \
                psql -h postgres -p {{ .Values.temporal.dbPort | quote }} -U {{ .Values.postgres.user | quote }} -d postgres -c "CREATE DATABASE temporal_visibility"
        - name: setup-temporal-schema
          image: "{{ .Values.images.temporalAdminTools.repository }}:{{ .Values.images.temporalAdminTools.tag }}"
          imagePullPolicy: {{ .Values.images.temporalAdminTools.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port {{ .Values.temporal.dbPort | quote }} --user {{ .Values.postgres.user | quote }} --password {{ .Values.postgres.password | quote }} --database temporal setup-schema -v 0.0 || true
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port {{ .Values.temporal.dbPort | quote }} --user {{ .Values.postgres.user | quote }} --password {{ .Values.postgres.password | quote }} --database temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned
        - name: setup-visibility-schema
          image: "{{ .Values.images.temporalAdminTools.repository }}:{{ .Values.images.temporalAdminTools.tag }}"
          imagePullPolicy: {{ .Values.images.temporalAdminTools.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port {{ .Values.temporal.dbPort | quote }} --user {{ .Values.postgres.user | quote }} --password {{ .Values.postgres.password | quote }} --database temporal_visibility setup-schema -v 0.0 || true
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port {{ .Values.temporal.dbPort | quote }} --user {{ .Values.postgres.user | quote }} --password {{ .Values.postgres.password | quote }} --database temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned
      containers:
        - name: temporal
          image: "{{ .Values.images.temporal.repository }}:{{ .Values.images.temporal.tag }}"
          imagePullPolicy: {{ .Values.images.temporal.pullPolicy }}
          command:
            - /etc/temporal/entrypoint.sh
          ports:
            - containerPort: 7233
          env:
            - name: DB
              value: {{ .Values.temporal.db | quote }}
            - name: DB_PORT
              value: {{ .Values.temporal.dbPort | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PWD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_SEEDS
              value: postgres
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: {{ .Values.temporal.dynamicConfigFilePath | quote }}
            - name: USE_INTERNAL_FRONTEND
              value: {{ .Values.temporal.useInternalFrontend | quote }}
            - name: TEMPORAL_TLS_REQUIRE_CLIENT_AUTH
              value: {{ .Values.tls.requireClientAuth | quote }}
            - name: TEMPORAL_TLS_SERVER_CERT
              value: /etc/temporal/certs/{{ .Values.tls.certKeys.serverCert }}
            - name: TEMPORAL_TLS_SERVER_KEY
              value: /etc/temporal/certs/{{ .Values.tls.certKeys.serverKey }}
            - name: TEMPORAL_TLS_SERVER_CA_CERT
              value: /etc/temporal/certs/{{ .Values.tls.certKeys.ca }}
            - name: TEMPORAL_TLS_INTERNODE_SERVER_NAME
              value: {{ .Values.tls.frontendServerName | quote }}
            - name: TEMPORAL_TLS_INTERNODE_DISABLE_HOST_VERIFICATION
              value: {{ .Values.tls.internodeDisableHostVerification | quote }}
            - name: TEMPORAL_TLS_FRONTEND_CERT
              value: /etc/temporal/certs/{{ .Values.tls.certKeys.serverCert }}
            - name: TEMPORAL_TLS_FRONTEND_KEY
              value: /etc/temporal/certs/{{ .Values.tls.certKeys.serverKey }}
            - name: TEMPORAL_TLS_CLIENT1_CA_CERT
              value: /etc/temporal/certs/{{ .Values.tls.certKeys.ca }}
            - name: TEMPORAL_TLS_CLIENT2_CA_CERT
              value: /etc/temporal/certs/{{ .Values.tls.certKeys.ca }}
            - name: TEMPORAL_TLS_FRONTEND_SERVER_NAME
              value: {{ .Values.tls.frontendServerName | quote }}
            - name: TEMPORAL_TLS_FRONTEND_DISABLE_HOST_VERIFICATION
              value: {{ .Values.tls.frontendDisableHostVerification | quote }}
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /etc/temporal/certs
              readOnly: true
          resources:
{{ toYaml .Values.temporal.resources | indent 12 }}
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: {{ include "temporal-demo.tlsSecretName" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
---
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-bootstrap-namespace
spec:
  template:
    metadata:
      labels:
        app: temporal-bootstrap-namespace
    spec:
      restartPolicy: OnFailure
      containers:
        - name: temporal-bootstrap-namespace
          image: "{{ .Values.images.temporalAdminTools.repository }}:{{ .Values.images.temporalAdminTools.tag }}"
          imagePullPolicy: {{ .Values.images.temporalAdminTools.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              while true; do
                output=$(temporal --address temporal:7233 --tls-ca-path /etc/temporal/certs/{{ .Values.tls.certKeys.ca }} --tls-server-name {{ .Values.tls.frontendServerName | quote }} operator namespace create --namespace {{ .Values.temporal.namespace.name | quote }} --retention {{ .Values.temporal.namespace.retention | quote }} 2>&1) && exit 0
                echo "$output"
                echo "$output" | grep -qi "already exists" && exit 0
                sleep 5
              done
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /etc/temporal/certs
              readOnly: true
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: {{ include "temporal-demo.tlsSecretName" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal-ui
          image: "{{ .Values.images.temporalUi.repository }}:{{ .Values.images.temporalUi.tag }}"
          imagePullPolicy: {{ .Values.images.temporalUi.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporalUi.temporalAddress | quote }}
            - name: TEMPORAL_CORS_ORIGINS
              value: {{ .Values.temporalUi.corsOrigins | quote }}
            - name: TEMPORAL_TLS_CA
              value: /certs/{{ .Values.tls.certKeys.ca }}
            - name: TEMPORAL_TLS_CERT
              value: /certs/{{ .Values.tls.certKeys.clientCert }}
            - name: TEMPORAL_TLS_KEY
              value: /certs/{{ .Values.tls.certKeys.clientKey }}
            - name: TEMPORAL_TLS_ENABLE_HOST_VERIFICATION
              value: "true"
            - name: TEMPORAL_TLS_SERVER_NAME
              value: {{ .Values.tls.frontendServerName | quote }}
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /certs
              readOnly: true
          resources:
{{ toYaml .Values.temporalUi.resources | indent 12 }}
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: {{ include "temporal-demo.tlsSecretName" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
spec:
  selector:
    app: temporal-ui
  type: {{ .Values.temporalUi.service.type }}
  ports:
    - name: http
      port: {{ .Values.temporalUi.service.port }}
      targetPort: {{ .Values.temporalUi.service.targetPort }}
      {{- if .Values.temporalUi.service.nodePort }}
      nodePort: {{ .Values.temporalUi.service.nodePort }}
      {{- end }}
---
