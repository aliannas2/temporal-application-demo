apiVersion: v1
kind: Namespace
metadata:
  name: temporal-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: temporal-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PASSWORD
              value: temporal
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: temporal-demo
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: temporal-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      initContainers:
        - name: ensure-visibility-database
          image: postgres:15
          env:
            - name: PGPASSWORD
              value: temporal
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres -p "5432" -U temporal; do
                sleep 2
              done
              psql -h postgres -p "5432" -U temporal -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='temporal_visibility'" | grep -q 1 || \
                psql -h postgres -p "5432" -U temporal -d postgres -c "CREATE DATABASE temporal_visibility"
        - name: setup-temporal-schema
          image: temporalio/admin-tools:1.26.2
          command:
            - sh
            - -ec
            - |
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port "5432" --user temporal --password temporal --database temporal setup-schema -v 0.0 || true
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port "5432" --user temporal --password temporal --database temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned
        - name: setup-visibility-schema
          image: temporalio/admin-tools:1.26.2
          command:
            - sh
            - -ec
            - |
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port "5432" --user temporal --password temporal --database temporal_visibility setup-schema -v 0.0 || true
              temporal-sql-tool --plugin postgres12 --endpoint postgres --port "5432" --user temporal --password temporal --database temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned
      containers:
        - name: temporal
          image: temporalio/server:1.26.2
          command:
            - /etc/temporal/entrypoint.sh
          ports:
            - containerPort: 7233
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              value: temporal
            - name: POSTGRES_SEEDS
              value: postgres
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: /etc/temporal/config/dynamicconfig/docker.yaml
            - name: USE_INTERNAL_FRONTEND
              value: "true"
            - name: TEMPORAL_TLS_REQUIRE_CLIENT_AUTH
              value: "false"
            - name: TEMPORAL_TLS_SERVER_CERT
              value: /etc/temporal/certs/server.crt
            - name: TEMPORAL_TLS_SERVER_KEY
              value: /etc/temporal/certs/server.key
            - name: TEMPORAL_TLS_SERVER_CA_CERT
              value: /etc/temporal/certs/ca.crt
            - name: TEMPORAL_TLS_INTERNODE_SERVER_NAME
              value: temporal
            - name: TEMPORAL_TLS_INTERNODE_DISABLE_HOST_VERIFICATION
              value: "true"
            - name: TEMPORAL_TLS_FRONTEND_CERT
              value: /etc/temporal/certs/server.crt
            - name: TEMPORAL_TLS_FRONTEND_KEY
              value: /etc/temporal/certs/server.key
            - name: TEMPORAL_TLS_CLIENT1_CA_CERT
              value: /etc/temporal/certs/ca.crt
            - name: TEMPORAL_TLS_CLIENT2_CA_CERT
              value: /etc/temporal/certs/ca.crt
            - name: TEMPORAL_TLS_FRONTEND_SERVER_NAME
              value: temporal
            - name: TEMPORAL_TLS_FRONTEND_DISABLE_HOST_VERIFICATION
              value: "true"
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /etc/temporal/certs
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: temporal-tls-certs
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: temporal-demo
spec:
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
---
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-bootstrap-namespace
  namespace: temporal-demo
spec:
  template:
    metadata:
      labels:
        app: temporal-bootstrap-namespace
    spec:
      restartPolicy: OnFailure
      containers:
        - name: temporal-bootstrap-namespace
          image: temporalio/admin-tools:1.26.2
          command:
            - sh
            - -ec
            - |
              while true; do
                output=$(temporal --address temporal:7233 --tls-ca-path /etc/temporal/certs/ca.crt --tls-server-name temporal operator namespace create --namespace default --retention 72h 2>&1) && exit 0
                echo "$output"
                echo "$output" | grep -qi "already exists" && exit 0
                sleep 5
              done
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /etc/temporal/certs
              readOnly: true
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: temporal-tls-certs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: temporal-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.31.2
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_CORS_ORIGINS
              value: http://localhost:8081
            - name: TEMPORAL_TLS_CA
              value: /certs/ca.crt
            - name: TEMPORAL_TLS_CERT
              value: /certs/client.crt
            - name: TEMPORAL_TLS_KEY
              value: /certs/client.key
            - name: TEMPORAL_TLS_ENABLE_HOST_VERIFICATION
              value: "true"
            - name: TEMPORAL_TLS_SERVER_NAME
              value: temporal
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: temporal-tls-certs
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: temporal-demo
spec:
  selector:
    app: temporal-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: temporal-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: temporal-demo-app:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "temporal_demo.api:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_TARGET_HOST
              value: temporal:7233
            - name: TEMPORAL_TASK_QUEUE
              value: demo-task-queue
            - name: TEMPORAL_MTLS_ENABLED
              value: "true"
            - name: TEMPORAL_TLS_USE_CLIENT_CERT
              value: "false"
            - name: TEMPORAL_TLS_DOMAIN
              value: temporal
            - name: TEMPORAL_TLS_CA_CERT_PATH
              value: /certs/ca.crt
            - name: TEMPORAL_TLS_CLIENT_CERT_PATH
              value: /certs/client.crt
            - name: TEMPORAL_TLS_CLIENT_KEY_PATH
              value: /certs/client.key
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: temporal-tls-certs
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: temporal-demo
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: temporal-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: temporal-demo-app:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "temporal_demo.worker"]
          env:
            - name: TEMPORAL_TARGET_HOST
              value: temporal:7233
            - name: TEMPORAL_TASK_QUEUE
              value: demo-task-queue
            - name: TEMPORAL_MTLS_ENABLED
              value: "true"
            - name: TEMPORAL_TLS_USE_CLIENT_CERT
              value: "false"
            - name: TEMPORAL_TLS_DOMAIN
              value: temporal
            - name: TEMPORAL_TLS_CA_CERT_PATH
              value: /certs/ca.crt
            - name: TEMPORAL_TLS_CLIENT_CERT_PATH
              value: /certs/client.crt
            - name: TEMPORAL_TLS_CLIENT_KEY_PATH
              value: /certs/client.key
          volumeMounts:
            - name: temporal-tls-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: temporal-tls-certs
          secret:
            secretName: temporal-tls-certs