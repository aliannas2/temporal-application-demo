services:
  postgres:
    image: postgres:15
    networks:
      - backend
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.26.2
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/docker.yaml

  temporal-proxy:
    image: nginx:1.27-alpine
    environment:
      TEMPORAL_AUTH_TOKEN: ${TEMPORAL_AUTH_TOKEN:?set TEMPORAL_AUTH_TOKEN in .env}
    depends_on:
      - temporal
    networks:
      - backend
      - app
    command: >
      /bin/sh -c
      "envsubst '$$TEMPORAL_AUTH_TOKEN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    ports:
      - "7233:7233"
    volumes:
      - ./proxy/nginx.conf.template:/etc/nginx/nginx.conf.template:ro

  temporal-ui:
    image: temporalio/ui:2.31.2
    networks:
      - backend
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8081
    ports:
      - "8233:8080"

  web:
    build:
      context: ./app
    networks:
      - app
    command: uvicorn temporal_demo.api:app --host 0.0.0.0 --port 8080
    depends_on:
      - temporal-proxy
    environment:
      TEMPORAL_TARGET_HOST: temporal-proxy:7233
      TEMPORAL_TASK_QUEUE: demo-task-queue
      TEMPORAL_AUTH_TOKEN: ${TEMPORAL_AUTH_TOKEN:?set TEMPORAL_AUTH_TOKEN in .env}
    ports:
      - "8081:8080"

  worker:
    build:
      context: ./app
    networks:
      - app
    command: python -m temporal_demo.worker
    depends_on:
      - temporal-proxy
    environment:
      TEMPORAL_TARGET_HOST: temporal-proxy:7233
      TEMPORAL_TASK_QUEUE: demo-task-queue
      TEMPORAL_AUTH_TOKEN: ${TEMPORAL_AUTH_TOKEN:?set TEMPORAL_AUTH_TOKEN in .env}

networks:
  backend:
  app:
