services:
  postgres:
    image: postgres:15
    networks:
      - backend
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.26.2
    networks:
      - backend
      - app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/docker.yaml
      USE_INTERNAL_FRONTEND: "true"
      TEMPORAL_TLS_REQUIRE_CLIENT_AUTH: "false"
      TEMPORAL_TLS_SERVER_CERT: /etc/temporal/certs/server.crt
      TEMPORAL_TLS_SERVER_KEY: /etc/temporal/certs/server.key
      TEMPORAL_TLS_SERVER_CA_CERT: /etc/temporal/certs/ca.crt
      TEMPORAL_TLS_INTERNODE_SERVER_NAME: temporal
      TEMPORAL_TLS_FRONTEND_CERT: /etc/temporal/certs/server.crt
      TEMPORAL_TLS_FRONTEND_KEY: /etc/temporal/certs/server.key
      TEMPORAL_TLS_CLIENT1_CA_CERT: /etc/temporal/certs/ca.crt
      TEMPORAL_TLS_CLIENT2_CA_CERT: /etc/temporal/certs/ca.crt
      TEMPORAL_TLS_FRONTEND_SERVER_NAME: temporal
    ports:
      - "7233:7233"
    volumes:
      - ./.certs:/etc/temporal/certs:ro

  temporal-ui:
    image: temporalio/ui:2.31.2
    networks:
      - app
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8081
      TEMPORAL_TLS_CA: /certs/ca.crt
      TEMPORAL_TLS_CERT: /certs/client.crt
      TEMPORAL_TLS_KEY: /certs/client.key
      TEMPORAL_TLS_ENABLE_HOST_VERIFICATION: "true"
      TEMPORAL_TLS_SERVER_NAME: ${TEMPORAL_TLS_DOMAIN:-temporal}
    ports:
      - "8233:8080"
    volumes:
      - ./.certs:/certs:ro

  web:
    build:
      context: ./app
    networks:
      - app
    command: uvicorn temporal_demo.api:app --host 0.0.0.0 --port 8080
    depends_on:
      - temporal
    environment:
      TEMPORAL_TARGET_HOST: temporal:7233
      TEMPORAL_TASK_QUEUE: demo-task-queue
      TEMPORAL_MTLS_ENABLED: "true"
      TEMPORAL_TLS_DOMAIN: ${TEMPORAL_TLS_DOMAIN:-temporal}
      TEMPORAL_TLS_CA_CERT_PATH: /certs/ca.crt
      TEMPORAL_TLS_CLIENT_CERT_PATH: /certs/client.crt
      TEMPORAL_TLS_CLIENT_KEY_PATH: /certs/client.key
    ports:
      - "8081:8080"
    volumes:
      - ./.certs:/certs:ro

  worker:
    build:
      context: ./app
    networks:
      - app
    command: python -m temporal_demo.worker
    depends_on:
      - temporal
    environment:
      TEMPORAL_TARGET_HOST: temporal:7233
      TEMPORAL_TASK_QUEUE: demo-task-queue
      TEMPORAL_MTLS_ENABLED: "true"
      TEMPORAL_TLS_DOMAIN: ${TEMPORAL_TLS_DOMAIN:-temporal}
      TEMPORAL_TLS_CA_CERT_PATH: /certs/ca.crt
      TEMPORAL_TLS_CLIENT_CERT_PATH: /certs/client.crt
      TEMPORAL_TLS_CLIENT_KEY_PATH: /certs/client.key
    volumes:
      - ./.certs:/certs:ro

networks:
  backend:
  app:
